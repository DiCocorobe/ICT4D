<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#343a40">Value Proposition Canvas: RedNodus</text>

  <!-- Left Side: Value Map (Square) -->
  <rect x="50" y="100" width="500" height="500" fill="none" stroke="#adb5bd" stroke-width="2" />
  <line x1="50" y1="350" x2="550" y2="350" stroke="#adb5bd" stroke-width="2" />
  <line x1="50" y1="350" x2="300" y2="100" stroke="#adb5bd" stroke-width="2" />
  <line x1="50" y1="350" x2="300" y2="600" stroke="#adb5bd" stroke-width="2" />
  <rect x="250" y="300" width="100" height="100" fill="#ffffff" stroke="#adb5bd" stroke-width="2" />
  <text x="300" y="355" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6c757d">GIFT</text>

  <!-- Value Map Labels -->
  <text x="150" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e67e22">Gain Creators</text>
  <text x="150" y="480" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e74c3c">Pain Relievers</text>
  <text x="310" y="200" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2ecc71" transform="rotate(-45, 310, 200)">Products &amp; Services</text>

  <!-- Right Side: Customer Profile (Circle) -->
  <circle cx="900" cy="350" r="250" fill="none" stroke="#adb5bd" stroke-width="2" />
  <line x1="650" y1="350" x2="1150" y2="350" stroke="#adb5bd" stroke-width="2" />
  <line x1="900" y1="350" x2="1050" y2="150" stroke="#adb5bd" stroke-width="2" />
  <line x1="900" y1="350" x2="1050" y2="550" stroke="#adb5bd" stroke-width="2" />
  
  <circle cx="900" cy="350" r="50" fill="#ffffff" stroke="#adb5bd" stroke-width="2" />
  <text x="900" y="355" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6c757d">USER</text>

  <!-- Customer Profile Labels -->
  <text x="850" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f1c40f">Gains</text>
  <text x="850" y="480" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e74c3c">Pains</text>
  <text x="1050" y="350" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2ecc71" transform="rotate(-90, 1050, 350)">Customer Jobs</text>

  <!-- Content Boxes (Simplified professional notes) -->
  <!-- Gains -->
  <rect x="750" y="130" width="120" height="40" rx="5" fill="#fef9e7" stroke="#f1c40f" />
  <text x="810" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Time Optimization</text>
  
  <rect x="880" y="160" width="120" height="40" rx="5" fill="#fef9e7" stroke="#f1c40f" />
  <text x="940" y="185" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Brand Visibility</text>

  <!-- Jobs -->
  <rect x="1050" y="250" width="120" height="40" rx="5" fill="#e8f8f5" stroke="#2ecc71" />
  <text x="1110" y="275" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Digital Transformation</text>

  <rect x="1050" y="410" width="120" height="40" rx="5" fill="#e8f8f5" stroke="#2ecc71" />
  <text x="1110" y="435" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Market Positioning</text>

  <!-- Pains -->
  <rect x="750" y="520" width="120" height="40" rx="5" fill="#fdedec" stroke="#e74c3c" />
  <text x="810" y="545" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Fear of Formalization</text>

  <rect x="880" y="550" width="120" height="40" rx="5" fill="#fdedec" stroke="#e74c3c" />
  <text x="940" y="575" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Resource Scarcity</text>

  <!-- Connectors -->
  <path d="M 550 350 L 650 350" fill="none" stroke="#343a40" stroke-width="2" marker-end="url(#arrowhead)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#343a40" />
    </marker>
  </defs>

  <text x="600" y="750" font-family="Arial, sans-serif" font-size="14" font-style="italic" text-anchor="middle" fill="#6c757d">Professionally translated and polished by Gemini CLI</text>
</svg>
